name: Sync Project Boards

on:
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync Type'
        required: true
        default: 'Regular'
        type: choice
        options:
          - Regular
          - Full
  push:
    branches: [main]
    paths:
      - 'scripts/sync-boards/sync-config.json'
  # schedule:
  #   # Scheduled runs migrated to cron-job.org (Account: jayalathmegha@gmail.com) to avoid GitHub Actions cron drift.
  #   # ~11:00 AM, ~5:00 PM Asia/Colombo (UTC+5:30) on weekdays
  #   - cron: '13 5,11 * * 1-5'
  #   # ~5:30 AM Asia/Colombo (UTC+5:30) on Saturdays (Full Sync)
  #   - cron: '47 23 * * 5'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Pester and PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run Pester tests (validates sync-config.json and helper logic)
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.5.0
          $result = Invoke-Pester -Path scripts/sync-boards/tests -CI -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Lint sync-boards.ps1 (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $findings = Invoke-ScriptAnalyzer -Path scripts/sync-boards/sync-boards.ps1
          $errors = $findings | Where-Object { $_.Severity -eq 'Error' }
          $warnings = $findings | Where-Object { $_.Severity -eq 'Warning' }
          if ($warnings) {
            Write-Host "PSScriptAnalyzer warnings (non-blocking):"
            $warnings | Format-Table -AutoSize | Out-String | Write-Host
          }
          if ($errors) {
            Write-Host "PSScriptAnalyzer errors:"
            $errors | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }

  sync-boards:
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Colombo"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Use a Personal Access Token with org admin / project write permissions.
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run Sync Script
        id: sync
        shell: pwsh
        run: |
          $syncArgs = @{}
          $isFullSync = $false
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ github.event.inputs.sync_type }}" -eq "Full") {
              $syncArgs["FullSync"] = $true
              $isFullSync = $true
            }
          } elseif ("${{ github.event_name }}" -eq "schedule") {
            # Saturday runs are Full Sync (check cron string for 100% reliability)
            if ("${{ github.event.schedule }}" -eq "47 23 * * 5") {
              $syncArgs["FullSync"] = $true
              $isFullSync = $true
            }
          }
          
          Write-Host "Executing sync with args: $($syncArgs.Keys -join ', ')"
          echo "is_full_sync=$($isFullSync.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          ./scripts/sync-boards/sync-boards.ps1 @syncArgs
        env:
          GH_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit and Push Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage every known output path the sync script can touch, regardless of sync
          # type — `git add` is a no-op for files that didn't change, and `|| true`
          # tolerates paths that don't exist yet (e.g. no FullSync manifest this run).
          git add changelogs/sync-boards.md || true
          git add changelogs/full-sync-manifest.json || true
          git add changelogs/full-sync.log || true
          git add scripts/sync-boards/sync-config.json || true
          git diff --staged --quiet || git commit -m "chore: auto-update board sync data"
          # Discards any OTHER unstaged change in the working tree (e.g. stray temp
          # files) before rebasing. If the script ever grows a new output file, add an
          # explicit `git add` for it above — otherwise this line will silently drop it.
          git restore .
          git pull --rebase origin main
          git push
