name: Sync Project Boards

on:
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync Type'
        required: true
        default: 'Regular'
        type: choice
        options:
          - Regular
          - Full
  schedule:
    # 11:00 AM, 5:00 PM Asia/Colombo (UTC+5:30) on weekdays
    - cron: '30 5,11 * * 1-5'
    # 5:30 AM Asia/Colombo (UTC+5:30) on Saturdays (Full Sync)
    - cron: '0 0 * * 6'

jobs:
  sync-boards:
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Colombo"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a Personal Access Token with org admin / project write permissions.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Run Sync Script
        shell: pwsh
        run: |
          $args = @()
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ github.event.inputs.sync_type }}" -eq "Full") {
              $args += "-FullSync"
            }
          } elseif ("${{ github.event_name }}" -eq "schedule") {
            # Saturday runs are Full Sync
            if ((Get-Date).DayOfWeek -eq "Saturday") {
              $args += "-FullSync"
            }
          }
          
          Write-Host "Executing sync with args: $args"
          ./scripts/sync-boards/sync-boards.ps1 $args
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Commit and Push Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add changelogs/sync-boards.md scripts/sync-boards/sync-config.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update board sync data"
          git pull --rebase origin main
          git push
